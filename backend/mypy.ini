[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

# SQLAlchemy-related errors to ignore (common with async SQLAlchemy)
ignore_errors = False

[mypy-sqlalchemy.*]
ignore_errors = True

[mypy-sqlalchemy.ext.asyncio.*]
ignore_errors = True

[mypy-asyncpg.*]
ignore_errors = True

[mypy-botocore.*]
ignore_errors = True

# Pydantic-related type errors
[mypy-pydantic.*]
ignore_errors = True
